<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calculator</title>
<link href="shared.css" rel="stylesheet"/>
<style>
.calc-wrap{max-width:360px;}
.display{background:#1a1a2e;border-radius:16px;padding:20px 24px;margin-bottom:14px;}
.display-expr{font-size:14px;color:#aaa;min-height:20px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.display-val{font-size:40px;font-weight:600;color:#fff;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.key{padding:0;height:60px;border:none;border-radius:14px;font-size:18px;font-weight:500;font-family:inherit;cursor:pointer;transition:transform .1s,filter .1s;}
.key:active{transform:scale(0.94);}
.key-num{background:#fff;color:#1a1a2e;border:0.5px solid rgba(0,0,0,0.08);}
.key-op{background:#eef3ff;color:#3b7cf4;}
.key-eq{background:#3b7cf4;color:#fff;}
.key-fn{background:#f0f0f2;color:#555;}
.key-zero{grid-column:span 2;}
.key:hover{filter:brightness(0.96);}
.history{margin-top:14px;}
.history-item{font-size:13px;color:#888;padding:6px 0;border-bottom:0.5px solid #f0f0f0;}
.history-item span{color:#1a1a2e;font-weight:500;float:right;}
</style>
</head>
<body>
<a class="logo" href="index.html">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
  <span class="logo-text">UnitConverter<span class="accent">.live</span></span>
</a>
<h1>Calculator</h1>
<p class="subtitle">Standard calculator with history</p>

<div class="calc-wrap">
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-val" id="disp">0</div>
  </div>
  <div class="keys">
    <button class="key key-fn" onclick="press('AC')">AC</button>
    <button class="key key-fn" onclick="press('+/-')">+/−</button>
    <button class="key key-fn" onclick="press('%')">%</button>
    <button class="key key-op" onclick="press('/')">÷</button>

    <button class="key key-num" onclick="press('7')">7</button>
    <button class="key key-num" onclick="press('8')">8</button>
    <button class="key key-num" onclick="press('9')">9</button>
    <button class="key key-op" onclick="press('*')">×</button>

    <button class="key key-num" onclick="press('4')">4</button>
    <button class="key key-num" onclick="press('5')">5</button>
    <button class="key key-num" onclick="press('6')">6</button>
    <button class="key key-op" onclick="press('-')">−</button>

    <button class="key key-num" onclick="press('1')">1</button>
    <button class="key key-num" onclick="press('2')">2</button>
    <button class="key key-num" onclick="press('3')">3</button>
    <button class="key key-op" onclick="press('+')">+</button>

    <button class="key key-num key-zero" onclick="press('0')">0</button>
    <button class="key key-num" onclick="press('.')">.</button>
    <button class="key key-eq" onclick="press('=')">=</button>
  </div>

  <div class="card history" id="history-card" style="display:none">
    <div class="card-label">History</div>
    <div id="history"></div>
  </div>
</div>

<script>
let cur='0', prev='', op='', fresh=false, history=[];
function update(){document.getElementById('disp').textContent=cur;document.getElementById('expr').textContent=prev+(op?{'/':'÷','*':'×','-':'−','+':'+'}[op]||op:'');}
function press(k){
  if(k==='AC'){cur='0';prev='';op='';fresh=false;}
  else if(k==='+/-'){cur=(+cur*-1).toString();}
  else if(k==='%'){cur=(+cur/100).toString();}
  else if(['+','-','*','/'].includes(k)){
    if(op&&!fresh){const r=calc(+prev,+cur,op);prev=r.toString();}
    else{prev=cur;}
    op=k;fresh=true;
  }
  else if(k==='='){
    if(!op)return;
    const expr=`${prev} ${({'/':'÷','*':'×','-':'−','+':'+'}[op]||op)} ${cur}`;
    const r=calc(+prev,+cur,op);
    addHistory(expr,r);
    cur=r.toString();prev='';op='';fresh=false;
  }
  else if(k==='.'){
    if(fresh){cur='0.';fresh=false;}
    else if(!cur.includes('.'))cur+='.';
  }
  else{
    if(cur==='0'||fresh){cur=k;fresh=false;}
    else if(cur.replace('-','').length<12) cur+=k;
  }
  update();
}
function calc(a,b,op){
  const r=op==='+'?a+b:op==='-'?a-b:op==='*'?a*b:op==='/'?a/b:b;
  return parseFloat(r.toPrecision(12));
}
function addHistory(expr,result){
  history.unshift({expr,result});
  if(history.length>10)history.pop();
  const card=document.getElementById('history-card');
  card.style.display='';
  document.getElementById('history').innerHTML=history.map(h=>
    `<div class="history-item">${h.expr} <span>= ${h.result}</span></div>`
  ).join('');
}
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') press(e.key);
  else if(['+','-','*','/'].includes(e.key)) press(e.key);
  else if(e.key==='Enter'||e.key==='=') press('=');
  else if(e.key==='Backspace'){if(cur.length>1)cur=cur.slice(0,-1);else cur='0';update();}
  else if(e.key==='.') press('.');
  else if(e.key==='Escape') press('AC');
});
update();
</script>
</body></html>
