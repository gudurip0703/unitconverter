<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calendar / Journal</title>
<link href="shared.css" rel="stylesheet"/>
<style>
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:4px 10px;border-radius:8px;transition:background .15s;}
.cal-nav:hover{background:#f0f0f2;}
.cal-month{font-size:17px;font-weight:600;color:#1a1a2e;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:6px 0;letter-spacing:.05em;}
.cal-day{text-align:center;padding:8px 0;border-radius:8px;font-size:14px;cursor:pointer;transition:background .15s;color:#1a1a2e;position:relative;}
.cal-day:hover{background:#f0f0f2;}
.cal-day.today{background:#3b7cf4;color:#fff;font-weight:600;}
.cal-day.selected{background:#eef3ff;color:#3b7cf4;font-weight:600;}
.cal-day.today.selected{background:#3b7cf4;color:#fff;}
.cal-day.other-month{color:#ccc;}
.cal-day.has-entry::after{content:'';width:5px;height:5px;background:#3b7cf4;border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.cal-day.today.has-entry::after{background:#fff;}
.journal-date{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:10px;}
textarea{resize:vertical;min-height:120px;font-size:14px;font-weight:400;line-height:1.6;}
.entry-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.entry-item{background:#f7f8fc;border-radius:10px;padding:10px 14px;}
.entry-item-date{font-size:11px;color:#aaa;margin-bottom:4px;}
.entry-item-text{font-size:13px;color:#333;line-height:1.5;}
</style>
</head>
<body>
<a class="logo" href="index.html">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
  <span class="logo-text">UnitConverter<span class="accent">.live</span></span>
</a>
<h1>Calendar / Journal</h1>
<p class="subtitle">Browse dates and write daily journal entries</p>

<div class="card">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="cal-month-label"></div>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="card">
  <div class="journal-date" id="journal-date">Select a day to write</div>
  <textarea id="journal-text" placeholder="Write your thoughts for this day…" oninput="saveEntry()"></textarea>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button class="btn" onclick="saveEntry()">Save entry</button>
    <button class="btn secondary" onclick="clearEntry()">Clear</button>
  </div>
</div>

<div class="card" id="entries-card">
  <div class="card-label">Recent entries</div>
  <div class="entry-list" id="entry-list"></div>
</div>

<script>
const today=new Date();
let viewYear=today.getFullYear(), viewMonth=today.getMonth();
let selectedDate=null;
const entries={};
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${months[viewMonth]} ${viewYear}`;
  const first=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
  let html=days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<first;i++){
    const d=daysInPrev-first+i+1;
    html+=`<div class="cal-day other-month">${d}</div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const key=dateKey(viewYear,viewMonth,d);
    const isToday=today.getFullYear()===viewYear&&today.getMonth()===viewMonth&&today.getDate()===d;
    const isSel=selectedDate===key;
    const hasEntry=!!entries[key];
    html+=`<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''} ${hasEntry?'has-entry':''}" onclick="selectDay(${viewYear},${viewMonth},${d})">${d}</div>`;
  }
  const remaining=42-(first+daysInMonth);
  for(let d=1;d<=remaining;d++) html+=`<div class="cal-day other-month">${d}</div>`;
  document.getElementById('cal-grid').innerHTML=html;
}
function changeMonth(dir){viewMonth+=dir;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}renderCalendar();}
function selectDay(y,m,d){
  selectedDate=dateKey(y,m,d);
  const dt=new Date(y,m,d);
  document.getElementById('journal-date').textContent=dt.toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('journal-text').value=entries[selectedDate]||'';
  renderCalendar();
}
function saveEntry(){
  if(!selectedDate)return;
  const text=document.getElementById('journal-text').value.trim();
  if(text) entries[selectedDate]=text; else delete entries[selectedDate];
  renderCalendar(); renderEntries();
}
function clearEntry(){
  document.getElementById('journal-text').value='';
  saveEntry();
}
function renderEntries(){
  const all=Object.entries(entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  document.getElementById('entry-list').innerHTML=all.map(([k,v])=>`<div class="entry-item"><div class="entry-item-date">${new Date(k+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',year:'numeric',month:'short',day:'numeric'})}</div><div class="entry-item-text">${v.substring(0,120)}${v.length>120?'…':''}</div></div>`).join('') || '<div style="color:#aaa;font-size:13px">No entries yet.</div>';
}
selectDay(today.getFullYear(),today.getMonth(),today.getDate());
renderEntries();
</script>
</body></html>
