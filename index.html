<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnitConverter.live</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f0f2;
      min-height: 100vh;
      padding: 24px 40px 48px;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 40px;
      text-decoration: none;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }
    .logo-text .accent { color: #3b7cf4; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 36px 20px 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      border: 0.5px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.10);
    }
    .card:active {
      transform: scale(0.97);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #f3f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .card-label {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a2e;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      body { padding: 20px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    @media (max-width: 420px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <a class="logo" href="#">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="4"/>
      <path d="M8 12h8M12 8v8"/>
    </svg>
    <span class="logo-text">UnitConverter<span class="accent">.live</span></span>
  </a>

  <div class="grid">

    <a class="card" href="height.html">
      <div class="card-icon">📏</div>
      <div class="card-label">Height</div>
    </a>

    <a class="card" href="weight.html">
      <div class="card-icon">⚖️</div>
      <div class="card-label">Weight/Unit</div>
    </a>

    <a class="card" href="bmi.html">
      <div class="card-icon">🩺</div>
      <div class="card-label">BMI Calc</div>
    </a>

    <a class="card" href="mortgage.html">
      <div class="card-icon">🏠</div>
      <div class="card-label">Mortgage</div>
    </a>

    <a class="card" href="construction.html">
      <div class="card-icon">📐</div>
      <div class="card-label">Construction</div>
    </a>

    <a class="card" href="currency.html">
      <div class="card-icon">💱</div>
      <div class="card-label">Currency</div>
    </a>

    <a class="card" href="calculator.html">
      <div class="card-icon">🧮</div>
      <div class="card-label">Calculator</div>
    </a>

    <a class="card" href="calendar.html">
      <div class="card-icon">📅</div>
      <div class="card-label">Calendar/Journal</div>
    </a>

    <a class="card" href="timezone.html">
      <div class="card-icon">🌍</div>
      <div class="card-label">Time Zone</div>
    </a>

    <a class="card" href="typing.html">
      <div class="card-icon">⌨️</div>
      <div class="card-label">Typing</div>
    </a>

    <a class="card" href="wordstotime.html">
      <div class="card-icon">⏱️</div>
      <div class="card-label">Words to Time</div>
    </a>

    <a class="card" href="compass.html">
      <div class="card-icon">🧭</div>
      <div class="card-label">Compass</div>
    </a>

  </div>

</body>
</html>
