<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mortgage Calculator</title>
<link href="shared.css" rel="stylesheet"/>
<style>
input[type=range]{width:100%;accent-color:#3b7cf4;margin-top:6px;}
.big-result{font-size:36px;font-weight:600;color:#3b7cf4;margin-bottom:4px;}
.big-label{font-size:13px;color:#888;}
.pie-wrap{display:flex;align-items:center;gap:20px;margin-top:16px;}
.legend{display:flex;flex-direction:column;gap:8px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#555;}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
th{text-align:left;color:#aaa;font-weight:500;padding:6px 0;border-bottom:0.5px solid #eee;}
td{padding:6px 0;border-bottom:0.5px solid #f5f5f5;color:#1a1a2e;}
td:last-child{text-align:right;font-weight:500;}
</style>
</head>
<body>
<a class="logo" href="index.html">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
  <span class="logo-text">UnitConverter<span class="accent">.live</span></span>
</a>
<h1>Mortgage Calculator</h1>
<p class="subtitle">Estimate your monthly payment and total cost</p>

<div class="card">
  <div class="row">
    <div class="input-wrap"><div class="input-label">Home price ($)</div><input type="number" id="price" value="400000" min="0"/></div>
    <div class="input-wrap"><div class="input-label">Down payment ($)</div><input type="number" id="down" value="80000" min="0"/></div>
  </div>
  <div class="row" style="margin-top:12px">
    <div class="input-wrap"><div class="input-label">Interest rate (%)</div><input type="number" id="rate" value="6.5" min="0" max="30" step="0.01"/></div>
    <div class="input-wrap">
      <div class="input-label">Loan term</div>
      <select id="term">
        <option value="30">30 years</option>
        <option value="20">20 years</option>
        <option value="15">15 years</option>
        <option value="10">10 years</option>
      </select>
    </div>
  </div>
</div>

<div class="card" id="results">
  <div class="big-label">Monthly payment</div>
  <div class="big-result" id="monthly">$—</div>
  <hr/>
  <div class="results">
    <div class="result"><div class="result-unit">Loan amount</div><div class="result-val" id="loan">—</div></div>
    <div class="result"><div class="result-unit">Total payment</div><div class="result-val" id="total">—</div></div>
    <div class="result"><div class="result-unit">Total interest</div><div class="result-val" id="interest">—</div></div>
    <div class="result"><div class="result-unit">Down payment %</div><div class="result-val" id="dpct">—</div></div>
  </div>
  <hr/>
  <div class="card-label">Amortization breakdown</div>
  <div class="pie-wrap">
    <canvas id="pie" width="100" height="100"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#3b7cf4"></div><span id="l-principal">Principal: —</span></div>
      <div class="legend-item"><div class="dot" style="background:#f5c842"></div><span id="l-interest">Interest: —</span></div>
    </div>
  </div>
</div>

<script>
function fmt(n){return'$'+Math.round(n).toLocaleString();}
function calc(){
  const price=+document.getElementById('price').value;
  const down=+document.getElementById('down').value;
  const annualRate=+document.getElementById('rate').value/100;
  const years=+document.getElementById('term').value;
  const loan=price-down;
  if(loan<=0||annualRate<=0)return;
  const r=annualRate/12, n=years*12;
  const monthly=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  const total=monthly*n;
  const totalInterest=total-loan;
  document.getElementById('monthly').textContent=fmt(monthly)+'/mo';
  document.getElementById('loan').innerHTML=fmt(loan)+'<small></small>';
  document.getElementById('total').innerHTML=fmt(total)+'<small></small>';
  document.getElementById('interest').innerHTML=fmt(totalInterest)+'<small></small>';
  document.getElementById('dpct').innerHTML=(down/price*100).toFixed(1)+'<small>%</small>';
  document.getElementById('l-principal').textContent='Principal: '+fmt(loan);
  document.getElementById('l-interest').textContent='Interest: '+fmt(totalInterest);
  drawPie(loan,totalInterest);
}
function drawPie(principal,interest){
  const c=document.getElementById('pie'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,100,100);
  const total=principal+interest;
  const pAngle=(principal/total)*Math.PI*2;
  ctx.beginPath();ctx.moveTo(50,50);ctx.arc(50,50,46,0,pAngle);ctx.closePath();ctx.fillStyle='#3b7cf4';ctx.fill();
  ctx.beginPath();ctx.moveTo(50,50);ctx.arc(50,50,46,pAngle,Math.PI*2);ctx.closePath();ctx.fillStyle='#f5c842';ctx.fill();
}
['price','down','rate','term'].forEach(id=>document.getElementById(id).addEventListener('input',calc));
calc();
</script>
</body></html>
