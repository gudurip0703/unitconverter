<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Typing Speed Test</title>
<link href="shared.css" rel="stylesheet"/>
<style>
.passage{background:#f7f8fc;border-radius:14px;padding:20px;font-size:18px;line-height:1.9;letter-spacing:.01em;user-select:none;margin-bottom:14px;}
.passage .correct{color:#3b7cf4;}
.passage .wrong{color:#e84545;text-decoration:underline;}
.passage .cursor{border-left:2px solid #3b7cf4;margin-left:-1px;animation:blink 1s step-start infinite;}
@keyframes blink{50%{opacity:0;}}
#type-input{opacity:0;position:absolute;pointer-events:none;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat{background:#f7f8fc;border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:28px;font-weight:600;color:#3b7cf4;}
.stat-label{font-size:12px;color:#aaa;margin-top:2px;}
.btn-row{display:flex;gap:10px;margin-top:14px;}
#click-prompt{font-size:13px;color:#aaa;text-align:center;margin-top:8px;}
select{max-width:200px;}
</style>
</head>
<body>
<a class="logo" href="index.html">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M8 12h8M12 8v8"/></svg>
  <span class="logo-text">UnitConverter<span class="accent">.live</span></span>
</a>
<h1>Typing Speed Test</h1>
<p class="subtitle">Measure your WPM and accuracy</p>

<div class="card">
  <div class="row" style="margin-bottom:14px">
    <div class="input-wrap" style="max-width:200px"><div class="input-label">Duration</div>
      <select id="duration" onchange="reset()">
        <option value="30">30 seconds</option>
        <option value="60" selected>60 seconds</option>
        <option value="120">2 minutes</option>
      </select>
    </div>
    <div class="input-wrap" style="max-width:200px"><div class="input-label">Difficulty</div>
      <select id="difficulty" onchange="reset()">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
  </div>

  <div class="passage" id="passage" onclick="focusInput()"></div>
  <div id="click-prompt">Click on the text above to start typing</div>
  <input type="text" id="type-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>

  <div class="stats" style="margin-top:14px">
    <div class="stat"><div class="stat-val" id="s-wpm">—</div><div class="stat-label">WPM</div></div>
    <div class="stat"><div class="stat-val" id="s-acc">—</div><div class="stat-label">Accuracy</div></div>
    <div class="stat"><div class="stat-val" id="s-time">—</div><div class="stat-label">Time left</div></div>
    <div class="stat"><div class="stat-val" id="s-chars">—</div><div class="stat-label">Chars</div></div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="reset()">↺ New test</button>
  </div>
</div>

<script>
const passages={
  easy:["the cat sat on the mat and looked at the dog the dog ran away fast","a big red fox jumped over the lazy dog near the old brown fence","the sun is bright today and the sky is blue with some white clouds"],
  medium:["The quick brown fox jumps over the lazy dog while the cat watches from the window sill with curious eyes.","Programming requires patience and practice to master the fundamentals before building complex applications.","The early bird catches the worm but the second mouse gets the cheese in this unpredictable world."],
  hard:["Technological advancements in artificial intelligence have fundamentally transformed how we interact with computational systems.","The juxtaposition of modernist architecture alongside historical preservation efforts creates fascinating urban landscapes worldwide.","Quantum computing leverages superposition and entanglement to process information exponentially faster than classical computers."]
};
let text='', typed=0, errors=0, started=false, finished=false, timer=null, timeLeft=60, startTime=null;

function getPassage(){const d=document.getElementById('difficulty').value;const arr=passages[d];return arr[Math.floor(Math.random()*arr.length)];}
function reset(){
  clearInterval(timer); started=false; finished=false; typed=0; errors=0;
  timeLeft=+document.getElementById('duration').value;
  text=getPassage();
  document.getElementById('s-wpm').textContent='—';
  document.getElementById('s-acc').textContent='—';
  document.getElementById('s-time').textContent=timeLeft+'s';
  document.getElementById('s-chars').textContent='—';
  document.getElementById('type-input').value='';
  document.getElementById('click-prompt').textContent='Click on the text above to start typing';
  render(0);
}
function render(pos){
  let html='';
  for(let i=0;i<text.length;i++){
    if(i<pos){
      const inp=document.getElementById('type-input').value[i]||'';
      const ok=inp===text[i];
      html+=`<span class="${ok?'correct':'wrong'}">${text[i]}</span>`;
    } else if(i===pos){
      html+=`<span class="cursor">${text[i]}</span>`;
    } else {
      html+=`<span>${text[i]}</span>`;
    }
  }
  document.getElementById('passage').innerHTML=html;
}
function focusInput(){
  document.getElementById('type-input').focus();
  if(!started&&!finished){document.getElementById('click-prompt').textContent='';}
}
document.getElementById('type-input').addEventListener('input',function(){
  if(finished)return;
  if(!started){
    started=true; startTime=Date.now();
    timer=setInterval(tick,1000);
  }
  const val=this.value;
  typed=val.length;
  let errs=0;
  for(let i=0;i<val.length;i++) if(val[i]!==text[i]) errs++;
  errors=errs;
  const elapsed=(Date.now()-startTime)/1000/60;
  const wpm=elapsed>0?Math.round((typed/5)/elapsed):0;
  const acc=typed>0?Math.round(((typed-errors)/typed)*100):100;
  document.getElementById('s-wpm').textContent=wpm;
  document.getElementById('s-acc').textContent=acc+'%';
  document.getElementById('s-chars').textContent=typed;
  render(typed);
  if(typed>=text.length) endTest();
});
function tick(){
  timeLeft--;
  document.getElementById('s-time').textContent=timeLeft+'s';
  if(timeLeft<=0) endTest();
}
function endTest(){
  clearInterval(timer); finished=true;
  document.getElementById('type-input').blur();
  document.getElementById('click-prompt').textContent='Test complete! Click "New test" to try again.';
}
reset();
</script>
</body></html>
